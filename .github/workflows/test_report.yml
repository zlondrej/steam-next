name: Show test report

on:
  workflow_run:
    workflows:
      - "Run tests and upload results"
    types:
      - completed

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Publish Pytest results (from artifacts)
        uses: dorny/test-reporter@v3
        with:
          # Match all matrix artifacts uploaded by CI
          artifact: /test-results-(.*)/
          # $1 is whatever matched (e.g. ubuntu-latest-py3.11)
          name: "Pytest ($1)"
          path: "junit.xml"
          reporter: java-junit
          fail-on-error: false
